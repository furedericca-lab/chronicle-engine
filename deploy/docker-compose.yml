name: chronicle-engine-backend

services:
  chronicle-engine-backend:
    image: ghcr.io/${GHCR_OWNER:-furedericca-lab}/chronicle-engine-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: chronicle-engine-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    environment:
      SERVER__BIND: "0.0.0.0:8080"
      SERVER__ADMIN_ASSETS_PATH: "/usr/local/bin/web/dist"
      STORAGE__LANCEDB_PATH: "/var/lib/chronicle-engine-backend/lancedb"
      STORAGE__SQLITE_PATH: "/var/lib/chronicle-engine-backend/sqlite/jobs.db"
      AUTH__RUNTIME__TOKEN: "${RUNTIME_TOKEN:-replace-with-runtime-bearer-token}"
      AUTH__ADMIN__TOKEN: "${ADMIN_TOKEN:-replace-with-admin-bearer-token}"
      LOGGING__LEVEL: "${LOG_LEVEL:-info}"
      PROVIDERS__EMBEDDING__BASE_URL: "${EMBEDDING_BASE_URL:-https://api.openai.com/v1}"
      PROVIDERS__EMBEDDING__MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      PROVIDERS__EMBEDDING__API: "${EMBEDDING_API:-openai}"
      PROVIDERS__EMBEDDING__API_KEY: "${EMBEDDING_API_KEY:-replace-with-embedding-api-key}"
      PROVIDERS__RERANK__ENABLED: "${RERANK_ENABLED:-false}"
    volumes:
      - ../data/chronicle-engine-backend/lancedb:/var/lib/chronicle-engine-backend/lancedb
      - ../data/chronicle-engine-backend/sqlite:/var/lib/chronicle-engine-backend/sqlite
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
