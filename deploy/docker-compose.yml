name: chronicle-engine-backend

services:
  chronicle-engine-backend:
    image: ghcr.io/${GHCR_OWNER:-furedericca-lab}/chronicle-engine-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: chronicle-engine-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend.toml:/etc/chronicle-engine-backend/backend.toml:ro
      - ../data/chronicle-engine-backend/lancedb:/var/lib/chronicle-engine-backend/lancedb
      - ../data/chronicle-engine-backend/sqlite:/var/lib/chronicle-engine-backend/sqlite
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
